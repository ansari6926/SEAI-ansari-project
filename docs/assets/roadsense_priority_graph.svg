<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <rect width="980" height="560" fill="#ffffff"/>
  <style>
    .axis{stroke:#243033;stroke-width:2}
    .grid{stroke:#dce4e6;stroke-width:1}
    .label{font:600 15px Arial;fill:#263235}
    .title{font:700 24px Arial;fill:#142326}
    .tick{font:500 13px Arial;fill:#556164}
  </style>
  <text x="70" y="45" class="title">Priority and SLA Mapping Used in RoadSense AI</text>
  <line class="axis" x1="90" y1="460" x2="890" y2="460"/>
  <line class="axis" x1="90" y1="90" x2="90" y2="460"/>
  <text x="395" y="525" class="label">Repair Priority Category</text>
  <text x="18" y="295" class="label" transform="rotate(-90 18 295)">SLA Response Time (hours)</text>

  <line class="grid" x1="90" y1="398" x2="890" y2="398"/>
  <line class="grid" x1="90" y1="336" x2="890" y2="336"/>
  <line class="grid" x1="90" y1="274" x2="890" y2="274"/>
  <line class="grid" x1="90" y1="212" x2="890" y2="212"/>
  <line class="grid" x1="90" y1="150" x2="890" y2="150"/>
  <text x="50" y="464" class="tick">0</text>
  <text x="43" y="402" class="tick">120</text>
  <text x="43" y="340" class="tick">240</text>
  <text x="43" y="278" class="tick">360</text>
  <text x="43" y="216" class="tick">480</text>
  <text x="43" y="154" class="tick">600</text>
  <text x="43" y="92" class="tick">720</text>

  <rect x="155" y="88" width="120" height="372" fill="#8fb7aa"/>
  <rect x="335" y="373" width="120" height="87" fill="#f2c14e"/>
  <rect x="515" y="423" width="120" height="37" fill="#ef7b45"/>
  <rect x="695" y="448" width="120" height="12" fill="#d84a4a"/>

  <text x="180" y="486" class="label">LOW</text>
  <text x="350" y="486" class="label">MEDIUM</text>
  <text x="550" y="486" class="label">HIGH</text>
  <text x="712" y="486" class="label">CRITICAL</text>

  <text x="180" y="78" class="label">720 h</text>
  <text x="370" y="363" class="label">168 h</text>
  <text x="555" y="413" class="label">72 h</text>
  <text x="732" y="438" class="label">24 h</text>
</svg>
