<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <rect width="1100" height="620" fill="#f7f9fa"/>
  <style>
    .box{fill:#ffffff;stroke:#1f4b4f;stroke-width:2;rx:12}
    .title{font:700 22px Arial;fill:#162326}
    .text{font:600 16px Arial;fill:#233033}
    .small{font:500 13px Arial;fill:#566265}
    .arrow{stroke:#146c5f;stroke-width:4;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#146c5f"/>
    </marker>
  </defs>
  <text x="40" y="46" class="title">RoadSense AI System Architecture</text>
  <text x="40" y="75" class="small">Road damage detection, severity analysis, civic repair planning, and maintenance alert generation</text>

  <rect class="box" x="55" y="130" width="210" height="92"/>
  <text x="90" y="166" class="text">User / Inspector</text>
  <text x="86" y="195" class="small">Uploads road image</text>

  <rect class="box" x="355" y="120" width="220" height="112"/>
  <text x="405" y="156" class="text">Frontend</text>
  <text x="386" y="185" class="small">HTML, CSS, JavaScript</text>
  <text x="383" y="206" class="small">Dashboard and results</text>

  <rect class="box" x="665" y="120" width="240" height="112"/>
  <text x="724" y="156" class="text">FastAPI Backend</text>
  <text x="704" y="185" class="small">REST endpoints</text>
  <text x="704" y="206" class="small">Image decoding and routing</text>

  <rect class="box" x="110" y="330" width="230" height="112"/>
  <text x="150" y="366" class="text">Vision Inference</text>
  <text x="142" y="395" class="small">YOLOv8 ONNX Runtime</text>
  <text x="154" y="416" class="small">or demo detection mode</text>

  <rect class="box" x="430" y="330" width="240" height="112"/>
  <text x="470" y="366" class="text">Analytics Layer</text>
  <text x="458" y="395" class="small">Severity score</text>
  <text x="458" y="416" class="small">LOW / MEDIUM / HIGH / CRITICAL</text>

  <rect class="box" x="760" y="330" width="260" height="112"/>
  <text x="802" y="366" class="text">Civic Repair Planner</text>
  <text x="792" y="395" class="small">Cost, crew, SLA, risk zone</text>
  <text x="792" y="416" class="small">Lane closure and dispatch note</text>

  <rect class="box" x="300" y="500" width="230" height="82"/>
  <text x="354" y="535" class="text">LLM / Rule Alert</text>
  <text x="342" y="560" class="small">Maintenance recommendation</text>

  <rect class="box" x="625" y="500" width="230" height="82"/>
  <text x="664" y="535" class="text">Final Output</text>
  <text x="655" y="560" class="small">Annotated image + JSON report</text>

  <line class="arrow" x1="265" y1="176" x2="350" y2="176"/>
  <line class="arrow" x1="575" y1="176" x2="660" y2="176"/>
  <line class="arrow" x1="785" y1="232" x2="250" y2="330"/>
  <line class="arrow" x1="340" y1="386" x2="425" y2="386"/>
  <line class="arrow" x1="670" y1="386" x2="755" y2="386"/>
  <line class="arrow" x1="870" y1="442" x2="750" y2="500"/>
  <line class="arrow" x1="550" y1="442" x2="435" y2="500"/>
  <line class="arrow" x1="530" y1="541" x2="620" y2="541"/>
</svg>
