<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <rect width="980" height="560" fill="#ffffff"/>
  <style>
    .axis{stroke:#243033;stroke-width:2}
    .grid{stroke:#dce4e6;stroke-width:1}
    .label{font:600 15px Arial;fill:#263235}
    .title{font:700 24px Arial;fill:#142326}
    .tick{font:500 13px Arial;fill:#556164}
  </style>
  <text x="70" y="45" class="title">Relative Repair Cost Weights by Damage Type</text>
  <line class="axis" x1="95" y1="460" x2="890" y2="460"/>
  <line class="axis" x1="95" y1="90" x2="95" y2="460"/>
  <text x="390" y="525" class="label">Damage Class</text>
  <text x="18" y="300" class="label" transform="rotate(-90 18 300)">Base Repair Cost (INR)</text>
  <line class="grid" x1="95" y1="386" x2="890" y2="386"/>
  <line class="grid" x1="95" y1="312" x2="890" y2="312"/>
  <line class="grid" x1="95" y1="238" x2="890" y2="238"/>
  <line class="grid" x1="95" y1="164" x2="890" y2="164"/>
  <text x="48" y="464" class="tick">0</text>
  <text x="36" y="390" class="tick">1000</text>
  <text x="36" y="316" class="tick">2000</text>
  <text x="36" y="242" class="tick">3000</text>
  <text x="36" y="168" class="tick">4000</text>
  <text x="36" y="94" class="tick">5000</text>
  <rect x="155" y="371" width="115" height="89" fill="#7cb7a8"/>
  <rect x="335" y="349" width="115" height="111" fill="#56a3a6"/>
  <rect x="515" y="201" width="115" height="259" fill="#f2c14e"/>
  <rect x="695" y="238" width="115" height="222" fill="#ef7b45"/>
  <text x="130" y="486" class="label">Longitudinal</text>
  <text x="345" y="486" class="label">Transverse</text>
  <text x="515" y="486" class="label">Alligator</text>
  <text x="725" y="486" class="label">Pothole</text>
  <text x="183" y="361" class="label">1200</text>
  <text x="363" y="339" class="label">1500</text>
  <text x="543" y="191" class="label">4500</text>
  <text x="723" y="228" class="label">3500</text>
</svg>
