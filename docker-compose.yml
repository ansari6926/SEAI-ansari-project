services:

  backend:
    build: ./backend
    image: yourusername/roadsense-ai-backend:latest
    container_name: roadsense-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MODEL_PATH=/app/best.onnx
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - roadsense-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    image: yourusername/roadsense-ai-frontend:latest
    container_name: roadsense-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - roadsense-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: roadsense-redis
    ports:
      - "6379:6379"
    networks:
      - roadsense-net
    restart: unless-stopped

networks:
  roadsense-net:
    driver: bridge
